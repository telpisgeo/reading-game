<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Читаємо разом</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFF9F0; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; user-select: none; -webkit-user-select: none;
}
.version-tag {
  position: fixed; top: 10px; right: 12px;
  font-size: 11px; color: #ccc; font-weight: 600; letter-spacing: .05em;
}
.game { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
.progress-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #E0D5C8; transition: background 0.3s; }
.dot.done { background: #F5A623; }
.dot.current { background: #FF6B35; width: 14px; height: 14px; }
.score { font-size: 15px; font-weight: 600; color: #F5A623; margin-left: 12px; }
.card {
  background: white; border-radius: 28px; padding: 40px 32px 36px;
  width: 100%; text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  position: relative; overflow: hidden;
}
.card-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg,#FF6B35,#F5A623); }
.syllables { font-size: 13px; color: #B0A090; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; min-height: 20px; }
.word { font-size: 64px; font-weight: 700; color: #2D2D2D; line-height: 1; margin-bottom: 14px; transition: color 0.3s; }
.word.listening { color: #FF6B35; }
.word.success { color: #4CAF50; }
.word.fail { color: #FF8A65; }
.hint { font-size: 15px; color: #B0A090; min-height: 44px; line-height: 1.4; }
.thinking { font-size: 14px; color: #F5A623; min-height: 20px; text-align: center; }
.mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }

/* mic status dot */
.mic-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #B0A090;
}
.mic-status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #ccc;
  flex-shrink: 0; transition: background 0.3s;
}
.mic-status-dot.ready  { background: #4CAF50; }
.mic-status-dot.active { background: #E53935; animation: blink .6s ease-in-out infinite; }
.mic-status-dot.error  { background: #FF8A65; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* volume bars */
.vol-bars {
  display: flex; align-items: flex-end; gap: 3px; height: 24px;
  opacity: 0; transition: opacity 0.2s;
}
.vol-bars.show { opacity: 1; }
.vol-bar {
  width: 4px; background: #FF6B35; border-radius: 2px;
  height: 4px; transition: height 0.08s;
}

.mic-btn {
  width: 88px; height: 88px; border-radius: 50%; border: none;
  background: #FF6B35; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  outline: none; -webkit-appearance: none; touch-action: manipulation;
  transition: transform 0.15s, background 0.2s;
}
.mic-btn:active { transform: scale(0.92); }
.mic-btn.recording { background: #E53935; animation: pulse 1s ease-in-out infinite; }
.mic-btn.loading { background: #9E9E9E; }
.mic-btn.disabled { background: #ccc; cursor: not-allowed; }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 20px rgba(229,57,53,0.4); }
  50% { box-shadow: 0 4px 40px rgba(229,57,53,0.7), 0 0 0 14px rgba(229,57,53,0.12); }
}
.mic-label { font-size: 14px; color: #B0A090; text-align: center; min-height: 20px; }
.result-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; padding: 24px;
}
.result-overlay.show { opacity: 1; pointer-events: all; }
.result-overlay.success-bg { background: rgba(76,175,80,0.15); }
.result-overlay.fail-bg { background: rgba(255,138,101,0.1); }
.result-card {
  background: white; border-radius: 28px; padding: 40px 32px;
  text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  width: 100%; max-width: 360px;
}
.result-emoji { font-size: 72px; line-height: 1; animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
.result-text { font-size: 26px; font-weight: 700; color: #2D2D2D; margin-top: 12px; }
.result-heard { font-size: 14px; color: #999; margin-top: 8px; line-height: 1.4; }
.next-btn {
  margin-top: 24px; padding: 14px 48px;
  background: #FF6B35; color: white; border: none;
  border-radius: 50px; font-size: 17px; font-weight: 600;
  cursor: pointer; touch-action: manipulation; width: 100%;
}
.confetti-piece {
  position: fixed; border-radius: 2px; pointer-events: none; z-index: 200;
  animation: fall 1.6s ease-in forwards;
}
@keyframes fall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(540deg);opacity:0} }
.finish { display: none; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.finish.show { display: flex; }
.game-wrap { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
.game-wrap.hide { display: none; }
.restart-btn {
  margin-top: 16px; padding: 16px 48px; background: #FF6B35; color: white; border: none;
  border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; touch-action: manipulation;
}
.debug { font-size: 11px; color: #bbb; text-align: center; margin-top: 4px; word-break: break-all; min-height: 16px; }
</style>
</head>
<body>
<div class="version-tag">v7</div>
<div class="game">
  <div class="game-wrap" id="gameWrap">
    <div class="progress-row" id="progressRow"></div>
    <div class="card">
      <div class="card-top"></div>
      <div class="syllables" id="syllables"></div>
      <div class="word" id="wordDisplay">...</div>
      <div class="hint" id="hint">Натисни мікрофон і прочитай слово вголос</div>
    </div>
    <div class="thinking" id="thinking"></div>
    <div class="mic-wrap">
      <div class="vol-bars" id="volBars">
        <div class="vol-bar" id="vb0"></div>
        <div class="vol-bar" id="vb1"></div>
        <div class="vol-bar" id="vb2"></div>
        <div class="vol-bar" id="vb3"></div>
        <div class="vol-bar" id="vb4"></div>
      </div>
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="mic-label" id="micLabel">натисни і говори</div>
      <div class="mic-status">
        <div class="mic-status-dot" id="micDot"></div>
        <span id="micStatusText">перевірка мікрофона…</span>
      </div>
    </div>
    <div class="debug" id="debug"></div>
  </div>
  <div class="finish" id="finishScreen">
    <div style="font-size:30px;font-weight:700;color:#2D2D2D">Молодець!</div>
    <div style="font-size:17px;color:#888">Ти прочитала всі слова</div>
    <div style="font-size:44px;font-weight:700;color:#F5A623" id="finalScore"></div>
    <button class="restart-btn" onclick="restartGame()">Ще раз</button>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-heard" id="resultHeard"></div>
    <button class="next-btn" onclick="nextWord()">Далі →</button>
  </div>
</div>
<script>
const ALL_WORDS = [
  {word:'суверенітет',     syllables:'су · ве · ре · ні · тет'},
  {word:'відповідальність',syllables:'від · по · ві · даль · ність'},
  {word:'конституція',     syllables:'кон · сти · ту · ці · я'},
  {word:'справедливість',  syllables:'спра · вед · ли · вість'},
  {word:'громадянство',    syllables:'гро · ма · дян · ство'},
  {word:'незалежність',    syllables:'не · за · леж · ність'},
  {word:'парламентаризм',  syllables:'пар · ла · мен · та · ризм'},
  {word:'демократія',      syllables:'де · мо · кра · ті · я'},
  {word:'індивідуальність',syllables:'ін · ди · ві · ду · аль · ність'},
  {word:'взаємодопомога',  syllables:'вза · є · мо · до · по · мо · га'},
  {word:'підприємництво',  syllables:'під · при · єм · ниц · тво'},
  {word:'самовдосконалення',syllables:'са · мо · вдос · ко · на · лен · ня'},
  {word:'усвідомлення',    syllables:'ус · ві · дом · лен · ня'},
  {word:'переконання',     syllables:'пе · ре · ко · нан · ня'},
  {word:'спостережливість',syllables:'спос · те · реж · ли · вість'},
  {word:'взаємозалежність',syllables:'вза · є · мо · за · леж · ність'},
  {word:'цілеспрямованість',syllables:'ці · ле · спря · мо · ва · ність'},
  {word:'самостійність',   syllables:'са · мос · тій · ність'},
  {word:'відчуженість',    syllables:'від · чу · же · ність'},
  {word:'пристосованість', syllables:'прис · то · со · ва · ність'},
];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let WORDS = shuffle(ALL_WORDS).slice(0, 10);

let current=0, score=0, recognition=null, isRecording=false;
let audioCtx=null, analyser=null, micStream=null, volTimer=null;
let micReady = false;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSuccess(){
  try {
    const ctx = getAudioCtx();
    // cheerful ascending arpeggio: C5 E5 G5 C6
    [[523,0],[659,0.12],[784,0.24],[1047,0.38]].forEach(([freq, when]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e){}
}

function playFail(){
  try {
    const ctx = getAudioCtx();
    // gentle descending two-tone
    [[330,0],[262,0.18]].forEach(([freq, when]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.38);
    });
  } catch(e){}
}

function playFinish(){
  try {
    const ctx = getAudioCtx();
    // victory fanfare: C5 E5 G5 pause C6 (longer)
    [[523,0],[659,0.15],[784,0.3],[1047,0.52]].forEach(([freq, when], i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = i===3 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      const dur = i===3 ? 0.7 : 0.22;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur + 0.05);
    });
  } catch(e){}
}

function dbg(msg){ document.getElementById('debug').textContent = msg; }

function setMicStatus(state, text){
  const dot = document.getElementById('micDot');
  const label = document.getElementById('micStatusText');
  dot.className = 'mic-status-dot' + (state ? ' '+state : '');
  label.textContent = text;
}

// Check mic permission on load
async function checkMic(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    micStream = stream;
    micReady = true;
    setMicStatus('ready', 'мікрофон підключено ✓');
    setupVolumeAnalyser(stream);
  } catch(e) {
    micReady = false;
    setMicStatus('error', 'немає доступу до мікрофона');
    document.getElementById('micBtn').className = 'mic-btn disabled';
    document.getElementById('micLabel').textContent = '';
    dbg('mic: '+e.name);
  }
}

function setupVolumeAnalyser(stream){
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);
  } catch(e){ /* skip if unsupported */ }
}

function startVolBars(){
  if(!analyser) return;
  const bars = [0,1,2,3,4].map(i => document.getElementById('vb'+i));
  const data = new Uint8Array(analyser.frequencyBinCount);
  document.getElementById('volBars').className = 'vol-bars show';

  volTimer = setInterval(()=>{
    analyser.getByteFrequencyData(data);
    // sample 5 frequency buckets
    const slots = [2,5,9,14,20];
    bars.forEach((b,i)=>{
      const v = data[slots[i]] || 0;
      const h = Math.max(4, Math.round((v/255)*24));
      b.style.height = h+'px';
    });
  }, 80);
}

function stopVolBars(){
  clearInterval(volTimer);
  volTimer = null;
  document.getElementById('volBars').className = 'vol-bars';
  [0,1,2,3,4].forEach(i=>{ document.getElementById('vb'+i).style.height='4px'; });
}

function buildProgress(){
  const row=document.getElementById('progressRow');
  row.innerHTML='';
  WORDS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<current?' done':i===current?' current':'');
    row.appendChild(d);
  });
  const sc=document.createElement('div');
  sc.className='score';
  sc.textContent='⭐ '+score;
  row.appendChild(sc);
}

function showWord(){
  const w=WORDS[current];
  document.getElementById('syllables').textContent=w.syllables;
  document.getElementById('wordDisplay').textContent=w.word;
  document.getElementById('wordDisplay').className='word';
  document.getElementById('hint').textContent='Натисни мікрофон і прочитай слово вголос';
  document.getElementById('thinking').textContent='';
  document.getElementById('micBtn').className='mic-btn';
  document.getElementById('micLabel').textContent='натисни і говори';
  buildProgress();
}

function toggleRecording(){
  if(!micReady){
    checkMic();
    return;
  }
  if(isRecording){ stopRecording(); }
  else{ startRecording(); }
}

function normalize(s){
  return s.toLowerCase().trim().replace(/[^а-яіїєґьʼ']/gi,'');
}

function wordsMatch(heard, target){
  const h = normalize(heard);
  const t = normalize(target);
  if(h === t) return true;
  if(h.includes(t)) return true;
  if(Math.abs(h.length - t.length) <= 1){
    let diff=0, si=0;
    const longer = h.length>=t.length ? h : t;
    const shorter = h.length<t.length ? h : t;
    for(let li=0;li<longer.length&&si<shorter.length;li++){
      if(longer[li]!==shorter[si]){ diff++; si++; } else { si++; }
    }
    if(diff + (shorter.length-si) <= 1) return true;
  }
  return false;
}

function startRecording(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('hint').textContent='Браузер не підтримує голос. Спробуй Chrome.';
    return;
  }

  recognition = new SR();
  recognition.lang = 'uk-UA';
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  isRecording = true;

  document.getElementById('micBtn').className='mic-btn recording';
  document.getElementById('micLabel').textContent='зупинити →';
  document.getElementById('wordDisplay').className='word listening';
  document.getElementById('hint').textContent='🔴 Читай зараз!';
  document.getElementById('thinking').textContent='';
  setMicStatus('active', 'слухаю…');
  startVolBars();

  recognition.onresult = (e) => {
    isRecording = false;
    stopVolBars();
    setMicStatus('ready', 'мікрофон підключено ✓');
    document.getElementById('micBtn').className='mic-btn';
    document.getElementById('micLabel').textContent='натисни і говори';
    document.getElementById('thinking').textContent='';

    const target = WORDS[current].word;
    let correct = false, bestHeard = '';

    for(let i=0; i<e.results[0].length; i++){
      const alt = e.results[0][i].transcript;
      if(i===0) bestHeard = alt;
      if(wordsMatch(alt, target)){ correct=true; bestHeard=alt; break; }
    }

    dbg('почув: "'+bestHeard+'"');
    showResult(correct, bestHeard);
  };

  recognition.onerror = (e) => {
    isRecording = false;
    stopVolBars();
    document.getElementById('micBtn').className='mic-btn';
    document.getElementById('micLabel').textContent='натисни і говори';
    document.getElementById('thinking').textContent='';
    document.getElementById('wordDisplay').className='word';
    if(e.error==='no-speech'){
      setMicStatus('ready', 'мікрофон підключено ✓');
      document.getElementById('hint').textContent='Нічого не почув. Спробуй ще раз!';
    } else {
      setMicStatus('error', 'помилка: '+e.error);
      document.getElementById('hint').textContent='Помилка мікрофона: '+e.error;
      dbg('SR error: '+e.error);
    }
  };

  recognition.onend = () => {
    if(isRecording){
      isRecording = false;
      stopVolBars();
      setMicStatus('ready', 'мікрофон підключено ✓');
      document.getElementById('micBtn').className='mic-btn';
      document.getElementById('micLabel').textContent='натисни і говори';
      document.getElementById('wordDisplay').className='word';
      document.getElementById('hint').textContent='Нічого не почув. Спробуй ще раз!';
    }
  };

  recognition.start();
}

function stopRecording(){
  if(recognition && isRecording){
    recognition.stop();
    stopVolBars();
    setMicStatus('ready', 'мікрофон підключено ✓');
    document.getElementById('micBtn').className='mic-btn loading';
    document.getElementById('micLabel').textContent='';
    document.getElementById('thinking').textContent='🤔 слухаю...';
  }
}

function showResult(success,heard){
  const overlay=document.getElementById('resultOverlay');
  if(success){
    score++;
    overlay.className='result-overlay success-bg show';
    document.getElementById('resultEmoji').textContent='';
    document.getElementById('resultText').textContent=['Супер!','Чудово!','Молодець!','Відмінно!','Браво!'][Math.floor(Math.random()*5)];
    document.getElementById('resultHeard').textContent='';
    document.getElementById('wordDisplay').className='word success';
    playSuccess();
    spawnConfetti();
  }else{
    playFail();
    overlay.className='result-overlay fail-bg show';
    document.getElementById('resultEmoji').textContent='';
    document.getElementById('resultText').textContent=['Майже! Ще спробуй!','Не здавайся!','Ти зможеш!'][Math.floor(Math.random()*3)];
    document.getElementById('resultHeard').textContent=heard?'Я почув: "'+heard+'"':'';
    document.getElementById('wordDisplay').className='word fail';
  }
  buildProgress();
}

function nextWord(){
  document.getElementById('resultOverlay').className='result-overlay';
  current++;
  if(current>=WORDS.length){
    document.getElementById('gameWrap').className='game-wrap hide';
    document.getElementById('finishScreen').className='finish show';
    document.getElementById('finalScore').textContent='⭐ '+score+' з '+WORDS.length;
    playFinish();
    spawnConfetti();
    return;
  }
  showWord();
}

function spawnConfetti(){
  const colors=['#FF6B35','#F5A623','#4CAF50','#2196F3','#E91E63'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.7}s;animation-duration:${1.2+Math.random()*0.8}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2500);
  }
}

function restartGame(){
  current=0; score=0;
  WORDS = shuffle(ALL_WORDS).slice(0, 10);
  document.getElementById('gameWrap').className='game-wrap';
  document.getElementById('finishScreen').className='finish';
  showWord();
}

showWord();
checkMic();
</script>
</body>
</html>
