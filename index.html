<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Читаємо разом</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFF9F0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  user-select: none;
  -webkit-user-select: none;
}
.game { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
.progress-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #E0D5C8; transition: background 0.3s; }
.dot.done { background: #F5A623; }
.dot.current { background: #FF6B35; width: 14px; height: 14px; }
.score { font-size: 15px; font-weight: 600; color: #F5A623; margin-left: 12px; }
.card {
  background: white; border-radius: 28px; padding: 40px 32px 36px;
  width: 100%; text-align: center;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  position: relative; overflow: hidden;
}
.card-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg,#FF6B35,#F5A623); }
.syllables { font-size: 13px; color: #B0A090; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; min-height: 20px; }
.word { font-size: 64px; font-weight: 700; color: #2D2D2D; line-height: 1; margin-bottom: 14px; transition: color 0.3s; }
.word.listening { color: #FF6B35; }
.word.success { color: #4CAF50; }
.word.fail { color: #FF8A65; }
.hint { font-size: 15px; color: #B0A090; min-height: 44px; line-height: 1.4; }
.thinking { font-size: 14px; color: #F5A623; min-height: 20px; text-align: center; }
.mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.mic-btn {
  width: 88px; height: 88px; border-radius: 50%; border: none;
  background: #FF6B35; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  outline: none; -webkit-appearance: none; touch-action: manipulation;
  transition: transform 0.15s, background 0.2s;
}
.mic-btn:active { transform: scale(0.92); }
.mic-btn.recording { background: #E53935; animation: pulse 1s ease-in-out infinite; }
.mic-btn.loading { background: #9E9E9E; }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 20px rgba(229,57,53,0.4); }
  50% { box-shadow: 0 4px 40px rgba(229,57,53,0.7), 0 0 0 14px rgba(229,57,53,0.12); }
}
.mic-label { font-size: 14px; color: #B0A090; text-align: center; min-height: 20px; }
.permission-btn {
  padding: 14px 32px; background: #FF6B35; color: white;
  border: none; border-radius: 50px; font-size: 16px; font-weight: 600;
  cursor: pointer; touch-action: manipulation; display: none;
}
.result-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; padding: 24px;
}
.result-overlay.show { opacity: 1; pointer-events: all; }
.result-overlay.success-bg { background: rgba(76,175,80,0.15); }
.result-overlay.fail-bg { background: rgba(255,138,101,0.1); }
.result-card {
  background: white; border-radius: 28px; padding: 40px 32px;
  text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  width: 100%; max-width: 360px;
}
.result-emoji { font-size: 72px; line-height: 1; }
.result-text { font-size: 26px; font-weight: 700; color: #2D2D2D; margin-top: 12px; }
.result-heard { font-size: 14px; color: #999; margin-top: 8px; line-height: 1.4; }
.next-btn {
  margin-top: 24px; padding: 14px 48px;
  background: #FF6B35; color: white; border: none;
  border-radius: 50px; font-size: 17px; font-weight: 600;
  cursor: pointer; touch-action: manipulation; width: 100%;
}
.confetti-piece {
  position: fixed; border-radius: 2px; pointer-events: none; z-index: 200;
  animation: fall 1.6s ease-in forwards;
}
@keyframes fall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(540deg);opacity:0} }
.finish { display: none; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.finish.show { display: flex; }
.game-wrap { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
.game-wrap.hide { display: none; }
.restart-btn {
  margin-top: 16px; padding: 16px 48px;
  background: #FF6B35; color: white; border: none;
  border-radius: 50px; font-size: 18px; font-weight: 600;
  cursor: pointer; touch-action: manipulation;
}
</style>
</head>
<body>
<div class="game">
  <div class="game-wrap" id="gameWrap">
    <div class="progress-row" id="progressRow"></div>
    <div class="card">
      <div class="card-top"></div>
      <div class="syllables" id="syllables"></div>
      <div class="word" id="wordDisplay">...</div>
      <div class="hint" id="hint">Натисни мікрофон і прочитай слово вголос</div>
    </div>
    <div class="thinking" id="thinking"></div>
    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
        <svg id="micIcon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="mic-label" id="micLabel">натисни і говори</div>
      <button class="permission-btn" id="permissionBtn" onclick="requestPermission()">
        Дозволити мікрофон 🎤
      </button>
    </div>
  </div>

  <div class="finish" id="finishScreen">
    <div style="font-size:72px">🏆</div>
    <div style="font-size:30px;font-weight:700;color:#2D2D2D">Молодець!</div>
    <div style="font-size:17px;color:#888">Ти прочитала всі слова</div>
    <div style="font-size:44px;font-weight:700;color:#F5A623" id="finalScore"></div>
    <button class="restart-btn" onclick="restartGame()">Ще раз! 🔄</button>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-heard" id="resultHeard"></div>
    <button class="next-btn" onclick="nextWord()">Далі →</button>
  </div>
</div>

<script>
const WORDS = [
  {word:'кіт',     syllables:'кіт',          hint:'🐱 Читай вголос!'},
  {word:'сонце',   syllables:'сон · це',      hint:'☀️ Читай вголос!'},
  {word:'мама',    syllables:'ма · ма',        hint:'👩 Читай вголос!'},
  {word:'книга',   syllables:'кни · га',       hint:'📚 Читай вголос!'},
  {word:'дерево',  syllables:'де · ре · во',   hint:'🌳 Читай вголос!'},
  {word:'молоко',  syllables:'мо · ло · ко',   hint:'🥛 Читай вголос!'},
  {word:'зірка',   syllables:'зір · ка',       hint:'⭐ Читай вголос!'},
  {word:'вода',    syllables:'во · да',         hint:'💧 Читай вголос!'},
  {word:'яблуко',  syllables:'яб · лу · ко',   hint:'🍎 Читай вголос!'},
  {word:'метелик', syllables:'ме · те · лик',  hint:'🦋 Читай вголос!'},
];

let current = 0, score = 0;
let mediaRecorder = null, audioChunks = [], isRecording = false;
let hasPermission = false;

async function checkPermission() {
  try {
    const result = await navigator.permissions.query({name: 'microphone'});
    if (result.state === 'granted') {
      hasPermission = true;
    } else if (result.state === 'denied') {
      showPermissionBtn();
    }
  } catch(e) {
    // permissions API not supported, will check on first use
  }
}

function showPermissionBtn() {
  document.getElementById('micBtn').style.display = 'none';
  document.getElementById('permissionBtn').style.display = 'block';
  document.getElementById('micLabel').textContent = 'Потрібен доступ до мікрофона';
}

async function requestPermission() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    stream.getTracks().forEach(t => t.stop());
    hasPermission = true;
    document.getElementById('micBtn').style.display = 'flex';
    document.getElementById('permissionBtn').style.display = 'none';
    document.getElementById('micLabel').textContent = 'натисни і говори';
    document.getElementById('hint').textContent = WORDS[current].hint;
  } catch(e) {
    document.getElementById('micLabel').textContent = 'Дозволи мікрофон у налаштуваннях';
    document.getElementById('hint').textContent = 'Налаштування → Safari → Мікрофон → Дозволити';
  }
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
    return;
  }
  await startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    hasPermission = true;
    audioChunks = [];

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4')
      ? 'audio/mp4'
      : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, {mimeType});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      processAudio();
    };

    mediaRecorder.start(100);
    isRecording = true;

    const btn = document.getElementById('micBtn');
    btn.className = 'mic-btn recording';
    document.getElementById('micLabel').textContent = 'зупинити →';
    document.getElementById('wordDisplay').className = 'word listening';
    document.getElementById('hint').textContent = '🔴 Читай зараз!';

    setTimeout(() => { if (isRecording) stopRecording(); }, 5000);

  } catch(e) {
    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      showPermissionBtn();
    } else {
      document.getElementById('hint').textContent = 'Помилка мікрофона. Спробуй ще раз.';
    }
  }
}

function stopRecording() {
  if (!mediaRecorder || !isRecording) return;
  isRecording = false;
  mediaRecorder.stop();
  const btn = document.getElementById('micBtn');
  btn.className = 'mic-btn loading';
  document.getElementById('micLabel').textContent = '';
  document.getElementById('thinking').textContent = '🤔 аналізую...';
}

async function processAudio() {
  const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType});
  const base64 = await new Promise(res => {
    const r = new FileReader();
    r.onloadend = () => res(r.result.split(',')[1]);
    r.readAsDataURL(blob);
  });

  const targetWord = WORDS[current].word;
  const mediaType = mediaRecorder.mimeType.split(';')[0];

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 150,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {type: 'base64', media_type: mediaType, data: base64}
            },
            {
              type: 'text',
              text: `Це аудіозапис дитини 10 років з дислексією яка читає українське слово вголос. Слово яке вона мала прочитати: "${targetWord}". Будь ласка транскрибуй що вона сказала і визнач чи правильно вона прочитала це слово. Будь щедрим у оцінці — якщо слово схоже за звучанням вважай правильним. Відповідай ТІЛЬКИ у форматі JSON без пояснень: {"heard":"що почув","correct":true або false}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    let heard = '', correct = false;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      heard = parsed.heard || '';
      correct = parsed.correct === true;
    } catch(e) {
      correct = text.toLowerCase().includes(targetWord.toLowerCase());
    }

    document.getElementById('thinking').textContent = '';
    document.getElementById('micBtn').className = 'mic-btn';
    document.getElementById('micLabel').textContent = 'натисни і говори';
    showResult(correct, heard);

  } catch(e) {
    document.getElementById('thinking').textContent = '';
    document.getElementById('micBtn').className = 'mic-btn';
    document.getElementById('micLabel').textContent = 'натисни і говори';
    document.getElementById('hint').textContent = 'Щось пішло не так. Спробуй ще раз.';
  }
}

function showResult(success, heard) {
  const overlay = document.getElementById('resultOverlay');
  if (success) {
    score++;
    overlay.className = 'result-overlay success-bg show';
    document.getElementById('resultEmoji').textContent = ['🎉','⭐','🌟','🏆','👏','🥳'][Math.floor(Math.random()*6)];
    document.getElementById('resultText').textContent = ['Супер!','Чудово!','Молодець!','Відмінно!','Браво!','Так тримати!'][Math.floor(Math.random()*6)];
    document.getElementById('resultHeard').textContent = '';
    document.getElementById('wordDisplay').className = 'word success';
    spawnConfetti();
  } else {
    overlay.className = 'result-overlay fail-bg show';
    document.getElementById('resultEmoji').textContent = ['💪','😊','🙌','🤗'][Math.floor(Math.random()*4)];
    document.getElementById('resultText').textContent = ['Майже! Ще спробуй!','Не здавайся!','Ти зможеш!','Ще раз!'][Math.floor(Math.random()*4)];
    document.getElementById('resultHeard').textContent = heard ? 'Я почув: "' + heard + '"' : '';
    document.getElementById('wordDisplay').className = 'word fail';
  }
  buildProgress();
}

function nextWord() {
  document.getElementById('resultOverlay').className = 'result-overlay';
  current++;
  if (current >= WORDS.length) {
    document.getElementById('gameWrap').className = 'game-wrap hide';
    document.getElementById('finishScreen').className = 'finish show';
    document.getElementById('finalScore').textContent = '⭐ ' + score + ' з ' + WORDS.length;
    spawnConfetti();
    return;
  }
  showWord();
}

function buildProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  WORDS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : i === current ? ' current' : '');
    row.appendChild(d);
  });
  const sc = document.createElement('div');
  sc.className = 'score';
  sc.textContent = '⭐ ' + score;
  row.appendChild(sc);
}

function showWord() {
  const w = WORDS[current];
  document.getElementById('syllables').textContent = w.syllables;
  document.getElementById('wordDisplay').textContent = w.word;
  document.getElementById('wordDisplay').className = 'word';
  document.getElementById('hint').textContent = w.hint;
  document.getElementById('thinking').textContent = '';
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micLabel').textContent = 'натисни і говори';
  buildProgress();
}

function spawnConfetti() {
  const colors = ['#FF6B35','#F5A623','#4CAF50','#2196F3','#E91E63','#9C27B0'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.7}s;animation-duration:${1.2+Math.random()*0.8}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function restartGame() {
  current = 0; score = 0;
  document.getElementById('gameWrap').className = 'game-wrap';
  document.getElementById('finishScreen').className = 'finish';
  showWord();
}

checkPermission();
showWord();
</script>
</body>
</html>
